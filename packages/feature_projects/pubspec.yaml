name: feature_projects
description: UNJYNX project management plugin - organize tasks into projects
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.9.0
  flutter: ">=3.27.0"

dependencies:
  drift: ^2.32.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.0
  freezed_annotation: ^3.0.0
  go_router: ^16.0.0
  json_annotation: ^4.11.0
  uuid: ^4.5.0

  service_api:
    path: ../service_api
  service_database:
    path: ../service_database
  unjynx_core:
    path: ../core

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  very_good_analysis: ^7.0.0
