name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/mobile/**'
      - 'pubspec.yaml'
      - 'melos.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/mobile/**'
      - 'pubspec.yaml'
      - 'melos.yaml'

concurrency:
  group: flutter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate code
        run: melos run build_runner

      - name: Analyze (strict)
        run: flutter analyze --fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate code
        run: melos run build_runner

      - name: Run tests - core
        run: flutter test packages/core

      - name: Run tests - service_database
        run: flutter test packages/service_database

      - name: Run tests - service_auth
        run: flutter test packages/service_auth

      - name: Run tests - service_sync
        run: flutter test packages/service_sync

      - name: Run tests - feature_todos
        run: flutter test packages/feature_todos

      - name: Run tests - feature_projects
        run: flutter test packages/feature_projects

      - name: Run tests - feature_home
        run: flutter test packages/feature_home

      - name: Run tests - feature_onboarding
        run: flutter test packages/feature_onboarding

      - name: Run tests - feature_settings
        run: flutter test packages/feature_settings

      - name: Run tests - feature_profile
        run: flutter test packages/feature_profile

      - name: Run tests - feature_notifications
        run: flutter test packages/feature_notifications

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [analyze, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate code
        run: melos run build_runner

      - name: Build APK (debug)
        run: flutter build apk --debug
        working-directory: apps/mobile

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [analyze, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate code
        run: melos run build_runner

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug
        working-directory: apps/mobile
