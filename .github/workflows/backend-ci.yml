name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todoapp
          POSTGRES_PASSWORD: todoapp_dev_password
          POSTGRES_DB: todoapp
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: valkey/valkey:8-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --filter @unjynx/backend...

      - name: Run tests
        run: pnpm --filter @unjynx/backend test
        env:
          DATABASE_URL: postgresql://todoapp:todoapp_dev_password@localhost:5432/todoapp
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          LOGTO_ENDPOINT: http://localhost:3001
          LOGTO_APP_ID: test-app-id
          LOGTO_APP_SECRET: test-app-secret

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 7

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --filter @unjynx/backend...

      - name: Type check
        run: pnpm --filter @unjynx/backend exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @unjynx/backend run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --filter @unjynx/backend...

      - name: Build
        run: pnpm --filter @unjynx/backend run build

      - name: Verify build output
        run: |
          if [ ! -d "apps/backend/dist" ]; then
            echo "Build output directory not found"
            exit 1
          fi
          echo "Build output verified"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/production/Dockerfile
          push: false
          tags: unjynx-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
