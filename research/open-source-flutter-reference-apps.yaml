    status: VALIDATED
    evidence:
      - "Immich (90k stars) uses Riverpod in production at massive scale"
      - "Multiple clean architecture templates use Riverpod 2.0 with codegen"
      - "Riverpod provider system maps cleanly to Clean Architecture"

  drift_as_local_database:
    status: VALIDATED
    evidence:
      - "Syncable uses Drift for offline-first sync with Supabase"
      - "Clean Architecture TODO app uses Drift with full-text search"
      - "Drift is the most type-safe SQLite solution for Flutter"
      - "Drift supports reactive streams (pairs well with Riverpod)"

  clean_architecture:
    status: VALIDATED
    evidence:
      - "Every major production app uses layered architecture"
      - "VGV 4-layer is most prescriptive and well-documented"
      - "Feature-first scales better than layer-first"

  feature_first_folder_structure:
    status: VALIDATED
    evidence:
      - "VGV, Immich, ssoad template, Momentous starter all use feature-first"
      - "Each feature contains its own domain/data/presentation layers"
      - "Scales much better than layer-first"

  melos_monorepo:
    status: VALIDATED
    evidence:
      - "Nimblehq example shows practical Melos configuration"
      - "Melos handles cross-package commands, versioning, publishing"

  plugin_module_architecture:
    status: VALIDATED
    evidence:
      - "AppFlowy plugin system for editors is the best reference"
      - "Flutterando Modular provides framework-level module support"
      - "Stuart Hexagonal enables swappable implementations"

  offline_first_with_sync_queue:
    status: VALIDATED
    evidence:
      - "Syncable implements transactional outbox pattern with Drift"
      - "GeekyAnts blueprint shows sync_queue table with retry logic"
      - "Timestamp-based conflict resolution is the standard approach"

  gamification_xp_streaks_badges:
    status: VALIDATED
    evidence:
      - "HabitQuest shows full gamification implementation"
      - "Teqani Rewards shows packageable gamification library"
      - "Both validate the feature set planned for UNJYNX"

