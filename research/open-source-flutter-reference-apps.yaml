  # -------------------------------------------------------------------------
  # 14. Nimblehq Monorepo Example
  # -------------------------------------------------------------------------
  - name: Nimblehq Flutter Monorepo Example
    github: https://github.com/nimblehq/flutter-monorepo-example
    stars: "23"
    architecture: "Melos Monorepo"
    tools: "Melos for workspace management"
    folder_structure: |
      apps/
        buyer_app/        # Buyer application
