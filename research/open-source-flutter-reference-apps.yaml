  # -------------------------------------------------------------------------
  - name: Syncable
    github: https://github.com/Mr-Pepe/syncable
    stars: "40"
    database: "Drift (SQLite) local, Supabase (PostgreSQL) remote"
    sync_strategy: "Offline-first with timestamp-based conflict resolution"
    key_patterns:
      - "Background sync loop processing change queues"
      - "Timestamp-based conflict resolution (newer wins)"
      - "Soft deletion with deleted flag propagation"
      - "User-scoped syncing (per-user data isolation)"
      - "Persistent sync timestamp storage for incremental updates"
      - "Device presence tracking to minimize real-time connections"
      - "Supabase real-time subscriptions for live sync"
    what_unjynx_can_learn:
      - "Offline Sync Engine: complete Drift + Supabase offline-first sync"
      - "Conflict Resolution: timestamp-based last-write-wins"
      - "Incremental Sync: only sync what changed"
      - "Drift + Supabase: exact combo relevant to UNJYNX"

