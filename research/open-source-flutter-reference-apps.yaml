# =============================================================================
# Open-Source Flutter Reference Apps for UNJYNX
# Research Date: 2026-03-02
# Purpose: 15 best open-source Flutter repos to study for UNJYNX
# =============================================================================

meta:
  total_repos_analyzed: 15
  categories_covered:
    - TODO/Task Management
    - Large-Scale Production Apps
    - Offline-First Sync
    - Gamification
    - Multi-Channel Notifications
    - Monorepo/Melos
    - Beautiful UI / Material 3
    - AI/LLM Integration
    - Plugin/Module Architecture

# =============================================================================
# TIER 1: PRIMARY REFERENCES (Most Relevant to UNJYNX)
# =============================================================================

tier_1_primary:

  # -------------------------------------------------------------------------
  # 1. AppFlowy - Open Source Notion Alternative
  # -------------------------------------------------------------------------
  - name: AppFlowy
    github: https://github.com/AppFlowy-IO/AppFlowy
    stars: "68,300+"
    languages: "Dart 73.8%, Rust 24.1%"
    architecture: DDD (Domain-Driven Design) with Flutter BLoC
    state_management: flutter_bloc
    database: "Rust-side persistence with Protobuf data models"
    last_updated: "Actively maintained (7,200+ commits)"
    folder_structure: |
      frontend/
        appflowy_flutter/
          assets/          # Fonts, images, translations
          lib/
            core/          # Startup tasks, shared configs
            plugins/       # Document, Grid, Board editors
            startup/       # App initialization
            user/          # User management
            workspace/     # Workspace management
          packages/        # Shared Flutter widgets
    key_patterns:
      - "Plugin-based editor system (Document, Grid, Board, Calendar)"
      - "Protobuf-based communication between Flutter and Rust"
      - "Event-driven BLoC: Widget -> Event -> Bloc -> State -> UI"
      - "Workspace/App/View hierarchy"
      - "Internationalization with translation resources"
    what_unjynx_can_learn:
      - "Plugin Architecture: extensible editor/view system where each view type is a separate plugin"
      - "Scale: managing a 68k+ star project with clear architecture boundaries"
      - "Offline-capable: desktop-first design with local-first data storage"
      - "Code Generation: Protobuf for type-safe cross-language communication"
    code_quality: "Production-grade, well-documented, active community. One of the best Flutter + Rust references."

  # -------------------------------------------------------------------------
  # 2. Immich - Self-Hosted Photo Management
  # -------------------------------------------------------------------------
  - name: Immich
    github: https://github.com/immich-app/immich
    stars: "90,000+"
    languages: "Dart (mobile), TypeScript (server)"
    architecture: MVVM with Clean Architecture layers
    state_management: "Riverpod (providers)"
    database: "Isar (local), PostgreSQL (server)"
    last_updated: "Extremely active (v2.5.0 released 2026)"
    folder_structure: |
      mobile/lib/
        constants/       # App-wide constants
        domain/          # Business logic and rules
        entities/        # Data model definitions
        extensions/      # Class extensions
        infrastructure/  # External service integrations
        interfaces/      # Abstract contracts
        mixins/          # Reusable behaviors
        models/          # Data structures
        pages/           # Full-screen UI views
        platform/        # Platform-specific code
        presentation/    # UI layer
        providers/       # Riverpod state/DI
        repositories/    # Data access abstraction
        routing/         # Navigation config
        services/        # Business logic services
        theme/           # Design system
        utils/           # Helpers
        widgets/         # Reusable UI components
    key_patterns:
      - "MVVM with Riverpod: Models -> Providers -> Services -> Views"
      - "Clean separation: domain, infrastructure, presentation layers"
      - "Repository pattern for data access abstraction"
      - "Background sync engine for photos"
      - "Platform-specific implementations via platform/ directory"
    what_unjynx_can_learn:
      - "Riverpod at Scale: THE BEST example of Riverpod in a production app with 90k+ stars"
      - "Offline Sync: Background photo upload/download queue patterns"
      - "Repository Pattern: Clean data access layer design"
      - "Folder Structure: One of the most comprehensive Flutter app structures"
    code_quality: "Exceptional. Production app used by thousands. Gold standard for Flutter + Riverpod."

  # -------------------------------------------------------------------------
  # 3. VGV News Toolkit (Google + Very Good Ventures)
  # -------------------------------------------------------------------------
  - name: VGV News Toolkit
    github: https://github.com/VGVentures/news_toolkit
    stars: "1,400+"
    architecture: "VGV Layered Architecture (4 layers)"
    state_management: BLoC
    database: "Firebase (remote)"
    last_updated: "Maintained by Google and VGV"
    architecture_layers: |
      Presentation Layer  -> Flutter widgets, UI
      Business Logic Layer -> BLoC (state management)
      Repository Layer    -> Domain logic, data aggregation
      Data Layer          -> Raw data from APIs/storage
    folder_structure: |
      flutter_news_example/
        lib/
          feature_name/
            bloc/           # Business logic
            view/           # Screens
            widgets/        # Feature-specific widgets
          app/              # App-level config
          l10n/             # Localization
    key_patterns:
      - "Feature-first folder organization (layers INSIDE each feature)"
      - "100% test coverage philosophy"
      - "BLoC with clear event/state separation"
      - "Firebase integration (auth, notifications, analytics, ads)"
      - "Monetization patterns (ads + subscriptions)"
      - "Very Good CLI for code generation"
    what_unjynx_can_learn:
      - "Feature-First Organization: each feature is self-contained"
      - "Testing Philosophy: near-100% test coverage"
      - "Production Patterns: auth, notifications, analytics"
      - "Google-Endorsed: how Google recommends building Flutter apps"
    code_quality: "Top-tier. Built by Google and VGV. Definitive BLoC architecture reference."

  # -------------------------------------------------------------------------
  # 4. Flutter Clean Architecture Example (State Management Comparison)
  # -------------------------------------------------------------------------
  - name: Flutter Clean Architecture Example
    github: https://github.com/guilherme-v/flutter-clean-architecture-example
    stars: "860+"
    architecture: "Clean Architecture (3-layer)"
    state_management: "BLoC, Cubit, Riverpod, Provider, MobX, GetIt (ALL compared)"
    database: "Remote API with caching"
    last_updated: Active
    folder_structure: |
      lib/layers/
        data/           # DTOs, data sources, repo implementations
        domain/         # Entities, use cases, repo interfaces
        presentation/
          using_bloc/
          using_cubit/
          using_riverpod/
          using_provider/
          using_mobx/
          using_get_it/
    key_patterns:
      - "Same app built with 6 different state management approaches"
      - "Material 3 theming (dark/light modes)"
      - "Infinite scrolling implementation"
      - "DTO -> Entity -> State mapping between layers"
      - "Comprehensive unit and widget tests for each approach"
    what_unjynx_can_learn:
      - "State Management Decision: direct comparison to validate Riverpod choice"
      - "Layer Mapping: transforming data between layers"
      - "Testing Patterns: tests for 6 SM approaches"
    code_quality: "Excellent educational quality. Perfect for understanding WHY each pattern exists."

  # -------------------------------------------------------------------------
  # 5. Clean Architecture TODO App (Riverpod + Drift)
  # -------------------------------------------------------------------------
  - name: Clean Architecture TODO App
    github: https://github.com/rodydavis/clean_architecture_todo_app
    stars: "164"
    architecture: "Clean Architecture (3-layer)"
    state_management: "Riverpod (Generator, StreamNotifier)"
    database: "Drift (SQLite) with full-text search"
    last_updated: "Updated for Material 3, latest Riverpod and Drift"
    key_patterns:
      - "TODO app with Riverpod + Drift -- EXACTLY the UNJYNX stack"
      - "StreamNotifier and FutureNotifier patterns"
      - "Adaptive layouts supporting all 6 Flutter platforms"
      - "Code generation (Riverpod Generator + Drift)"
      - "Full-text search with Drift"
    what_unjynx_can_learn:
      - "Exact Stack Match: Flutter + Clean Arch + Riverpod + Drift"
      - "Drift Patterns: setup with code gen and full-text search"
      - "Riverpod Generator: modern codegen approach"
      - "Cross-Platform: adaptive layouts"
    code_quality: "Good reference quality. Small but focused on the exact UNJYNX tech stack."

# =============================================================================
# TIER 2: ARCHITECTURE AND PATTERNS REFERENCES
# =============================================================================

tier_2_architecture:

  # -------------------------------------------------------------------------
  # 6. ssoad Riverpod Clean Architecture Template
  # -------------------------------------------------------------------------
  - name: Flutter Riverpod Clean Architecture Template
    github: https://github.com/ssoad/flutter_riverpod_clean_architecture
    stars: "63"
    architecture: "Strict Clean Architecture"
    state_management: "Riverpod 2.0 (Notifier, AsyncNotifier)"
    error_handling: "fpdart (Either<Failure, T>)"
    last_updated: Active
    folder_structure: |
      lib/
        core/              # Shared kernel (Errors, Network, Utils)
        features/
          auth/
            domain/        # Entities, repos (interfaces), usecases
            data/          # Datasources, models, repo implementations
            presentation/  # Providers, screens, widgets
            providers/     # Riverpod DI for data layer
          chat/
          survey/
        main.dart
    key_patterns:
      - "fpdart for functional error handling (Either<Failure, T>)"
      - "Feature Generator script (./generate_feature.sh)"
      - "WebSocket integration pattern"
      - "Form validation patterns"
      - "Secure storage + biometric authentication"
      - "Golden tests for visual regression"
    what_unjynx_can_learn:
      - "Feature Generator: auto-create boilerplate for new features"
      - "Functional Error Handling: fpdart Either pattern"
      - "Riverpod 2.0: modern Notifier/AsyncNotifier usage"
      - "WebSocket: real-time communication patterns"

  # -------------------------------------------------------------------------
  # 7. Momentous Flutter Starter App
  # -------------------------------------------------------------------------
  - name: Momentous Flutter Starter App
    github: https://github.com/momentous-developments/flutter-starter-app
    stars: "29"
    architecture: "Clean Architecture + Feature-First"
    state_management: "Riverpod 2.0 with codegen"
    routing: GoRouter
    ui: "Material 3 with flex_color_scheme"
    folder_structure: |
      lib/
        core/
          constants/
          error_handling/
          models/
          providers/
          router/
          services/
          theme/
        features/
          auth/
          dashboard/
          forms/
          home/
          notifications/
          onboarding/
          settings/
          users/
        l10n/
        shared/
        main.dart
    key_patterns:
      - "Pre-built features: auth, dashboard, notifications, onboarding, settings"
      - "Skeleton screens and loading states"
      - "Responsive design patterns"
      - "flutter_animate for smooth animations"
      - "flex_color_scheme for dynamic theming"
      - "i18n with intl"
    what_unjynx_can_learn:
      - "Pre-Built Features: many overlap with UNJYNX features"
      - "Theming: flex_color_scheme + Material 3 dynamic theming"
      - "Animations: flutter_animate integration"
      - "Responsive Design: adaptive layouts"

  # -------------------------------------------------------------------------
  # 8. Flutterando Modular (Plugin Architecture Framework)
  # -------------------------------------------------------------------------
  - name: Flutterando Modular
    github: https://github.com/Flutterando/modular
    stars: "1,400+"
    architecture: "Feature-First Modular"
    routing: "Built-in modular routing"
    di: "Built-in dependency injection"
    module_structure: |
      Each Module contains:
        - Routes (ChildRoute for pages, ModuleRoute for sub-modules)
        - Binds (Dependency injection registrations)

      Module tree mirrors widget tree:
        AppModule
          - HomeModule
          - AuthModule
            - LoginModule
            - RegisterModule
          - SettingsModule
    key_patterns:
      - "Module nesting (modules within modules)"
      - "Scoped routing per module"
      - "Scoped dependency injection per module"
      - "Works with ANY state management"
      - "Dynamic routes, wildcards, query parameters"
    what_unjynx_can_learn:
      - "Plugin Architecture: true plugin system where features are independent modules"
      - "Module Lifecycle: modules created/destroyed on demand"
      - "Scoped DI: each module has its own dependency scope"
      - "Route Isolation: each module manages its own routes"
    code_quality: "Production-ready package used by many Flutter apps."

  # -------------------------------------------------------------------------
  # 9. StuartApp Modular Architecture (Hexagonal)
  # -------------------------------------------------------------------------
  - name: Stuart Flutter Modular Architecture
    github: https://github.com/StuartApp/flutter-modular-architecture
    stars: "41"
    architecture: "Clean Architecture + Hexagonal (Ports and Adapters)"
    state_management: BLoC
    di: "GetIt with DependencyConfigurator pattern"
    folder_structure: |
      packages/
        shared/all/core/              # Shared core utilities
        use_cases/
          find_bikes/
            real_adapters/            # Production implementations
            fake_adapters/            # Test/dev implementations
        features/
          bike_map/
            lib/
              bloc/
              screens/
              widgets/
    key_patterns:
      - "Ports and Adapters: use cases expose interfaces, adapters implement"
      - "Real vs Fake Adapters: swap production/test implementations"
      - "DependencyConfigurator: each package registers its own deps"
      - "Package-level isolation: each use case/feature is its own Dart package"
    what_unjynx_can_learn:
      - "Hexagonal Architecture: true adapter pattern for swappable implementations"
      - "Package-Level Modules: each feature is a separate Dart package"
      - "Fake Adapters: clean testing with swappable implementations"
      - "Enterprise Patterns: inspired by Android at Scale at Square"

