name: unjynx_mobile
description: "UNJYNX - Break the satisfactory. Unjynx your productivity."
publish_to: none
version: 0.5.0+1

resolution: workspace

environment:
  sdk: ^3.9.0

dependencies:
  dio: ^5.7.0
  drift: ^2.31.0
  feature_ai:
    path: ../../packages/feature_ai
  feature_billing:
    path: ../../packages/feature_billing
  feature_gamification:
    path: ../../packages/feature_gamification
  feature_goals:
    path: ../../packages/feature_goals
  feature_home:
    path: ../../packages/feature_home
  feature_messaging:
    path: ../../packages/feature_messaging
  feature_import_export:
    path: ../../packages/feature_import_export
  feature_notifications:
    path: ../../packages/feature_notifications
  feature_onboarding:
    path: ../../packages/feature_onboarding
  feature_profile:
    path: ../../packages/feature_profile
  feature_projects:
    path: ../../packages/feature_projects
  feature_settings:
    path: ../../packages/feature_settings
  feature_sprints:
    path: ../../packages/feature_sprints
  feature_team:
    path: ../../packages/feature_team
  feature_todos:
    path: ../../packages/feature_todos
  feature_widgets:
    path: ../../packages/feature_widgets
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0
  google_sign_in: ^6.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.0
  get_it: ^8.0.0
  go_router: ^16.0.0
  injectable: ^2.5.0
  riverpod_annotation: ^4.0.0
  sentry_flutter: ^9.0.0
  service_api:
    path: ../../packages/service_api
  service_auth:
    path: ../../packages/service_auth
  service_database:
    path: ../../packages/service_database
  service_notification:
    path: ../../packages/service_notification
  service_sync:
    path: ../../packages/service_sync
  shared_preferences: ^2.3.0
  unjynx_core:
    path: ../../packages/core

dev_dependencies:
  build_runner: ^2.12.2
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.12.1
  very_good_analysis: ^7.0.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
    - assets/images/logo-icon.png
    - assets/images/logo-light.png
    - assets/images/logo-dark.png
  fonts:
    - family: BebasNeue
      fonts:
        - asset: google_fonts/BebasNeue-Regular.ttf
    - family: Outfit
      fonts:
        - asset: google_fonts/Outfit-Variable.ttf
    - family: PlayfairDisplay
      fonts:
        - asset: google_fonts/PlayfairDisplay-Variable.ttf
        - asset: google_fonts/PlayfairDisplay-Italic-Variable.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: google_fonts/DMSans-Variable.ttf
