# UNJYNX Security Compliance Checklist
# Based on OWASP Mobile Top 10 (2024) + OWASP API Security Top 10 (2023)
#
# Status values: pass | partial | fail | not_applicable
# Last reviewed: 2026-03-11
# Reviewer: Security team

project: UNJYNX
version: "1.0"
review_date: "2026-03-11"

# ─────────────────────────────────────────────────────────────────────────────
# OWASP Mobile Application Security Top 10 (2024)
# https://owasp.org/www-project-mobile-top-10/
# ─────────────────────────────────────────────────────────────────────────────

owasp_mobile_top_10:
  M1_improper_platform_usage:
    status: pass
    severity: high
    notes: "All API calls use Hono middleware validation with Zod schemas. Flutter uses platform-specific secure storage APIs."
    controls:
      - "Zod schema validation on all request bodies"
      - "Platform permission requests follow principle of least privilege"
      - "No WebView with JavaScript bridge usage"
    evidence:
      - "apps/backend/src/modules/*/routes.ts - zValidator on all endpoints"
      - "packages/service_auth/ - flutter_secure_storage for credential storage"

  M2_insecure_data_storage:
    status: pass
    severity: critical
    notes: "Tokens in flutter_secure_storage (Keychain/Keystore). Local DB via Drift with WAL mode. No sensitive data in SharedPreferences."
    controls:
      - "flutter_secure_storage for JWT tokens and refresh tokens"
      - "Drift database with WAL mode for local task data"
      - "No PII stored in SharedPreferences (theme prefs only)"
      - "Database encryption planned for Phase 5 (SQLCipher)"
    evidence:
      - "packages/service_auth/lib/src/auth_storage.dart"
      - "packages/service_database/lib/src/database.dart"

  M3_insecure_communication:
    status: pass
    severity: critical
    notes: "All API traffic over HTTPS/TLS 1.3. SSL pinning configuration prepared. WebSocket connections use WSS."
    controls:
      - "TLS 1.3 minimum for all API connections"
      - "SSL pinning via infra/security/ssl-config.ts"
      - "Certificate transparency monitoring planned"
      - "No fallback to HTTP in production builds"
    evidence:
      - "infra/security/ssl-config.ts"
      - "packages/service_api/lib/src/api_client.dart - baseUrl uses https in prod"

  M4_insecure_authentication:
    status: pass
    severity: critical
    notes: "Logto OIDC with PKCE flow. JWT tokens with short expiry (15min access, 7d refresh). No stored passwords."
    controls:
      - "PKCE authorization code flow (no implicit grant)"
      - "15-minute access token expiry"
      - "7-day refresh token with rotation"
      - "Logto handles password hashing (Argon2id)"
      - "MFA support via Logto (TOTP, WebAuthn)"
    evidence:
      - "apps/backend/src/modules/auth/auth.routes.ts"
      - "apps/backend/src/modules/auth/auth.service.ts"

  M5_insufficient_cryptography:
    status: pass
    severity: high
    notes: "No custom crypto implementations. Using standard libraries only: Logto for auth, HTTPS for transport, flutter_secure_storage for at-rest."
    controls:
      - "No custom encryption algorithms"
      - "Standard TLS for data in transit"
      - "Platform keychain/keystore for secrets at rest"
      - "Argon2id for password hashing (via Logto)"

  M6_insecure_authorization:
    status: pass
    severity: critical
    notes: "All endpoints verify JWT profileId matches resource owner. Middleware extracts auth context before any handler."
    controls:
      - "Auth middleware resolves logtoId -> profileId on every request"
      - "Resource ownership verified in service layer"
      - "Role-based access for admin endpoints (Phase 4)"
      - "No direct object references without ownership check"
    evidence:
      - "apps/backend/src/middleware/auth.ts"
      - "apps/backend/src/modules/tasks/tasks.service.ts - userId filter on all queries"

  M7_client_code_quality:
    status: pass
    severity: medium
    notes: "Flutter analyze with zero warnings. ESLint for backend. Immutable state patterns via Riverpod + freezed."
    controls:
      - "flutter analyze --fatal-infos in CI"
      - "ESLint strict configuration for backend"
      - "freezed for immutable data classes"
      - "Riverpod for predictable state management"
      - "1873 automated tests across backend + Flutter"

  M8_code_tampering:
    status: pass
    severity: medium
    notes: "Release builds use code obfuscation + R8 shrinking. Root/jailbreak detection implemented. Shorebird OTA for emergency patches."
    controls:
      - "Flutter release build with --obfuscate --split-debug-info"
      - "ProGuard/R8 rules for Android native code (proguard-rules.pro)"
      - "Root/jailbreak detection (packages/core/lib/src/security/device_integrity.dart)"
      - "Network security config with certificate pinning"
      - "Shorebird OTA updates for rapid patching"
    evidence:
      - "apps/mobile/android/app/proguard-rules.pro"
      - "apps/mobile/android/app/build.gradle.kts - isMinifyEnabled=true, isShrinkResources=true"
      - "packages/core/lib/src/security/device_integrity.dart"
      - "apps/mobile/android/app/src/main/res/xml/network_security_config.xml"

  M9_reverse_engineering:
    status: partial
    severity: low
    notes: "Standard Flutter AOT compilation provides baseline protection. No sensitive business logic on client."
    controls:
      - "AOT compilation (no Dart source in release builds)"
      - "API keys in environment variables, not hardcoded"
      - "Business logic executed server-side"
    todo:
      - "Consider DexGuard/iXGuard for additional protection"

  M10_extraneous_functionality:
    status: pass
    severity: medium
    notes: "Debug endpoints disabled in production builds. No test accounts in production. Logging sanitized."
    controls:
      - "NODE_ENV check disables debug routes"
      - "No test/staging credentials in production config"
      - "Log sanitization removes PII"
      - "Feature flags for experimental features"

# ─────────────────────────────────────────────────────────────────────────────
# OWASP API Security Top 10 (2023)
# https://owasp.org/API-Security/editions/2023/en/0x11-t10/
# ─────────────────────────────────────────────────────────────────────────────

owasp_api_top_10:
  API1_broken_object_level_auth:
    status: pass
    severity: critical
    notes: "All endpoints verify userId from JWT matches resource owner. No horizontal privilege escalation possible."
    controls:
      - "Auth middleware injects profileId from JWT into every request context"
      - "Service layer filters all queries by authenticated userId"
      - "Repository layer always includes userId in WHERE clauses"
      - "Test coverage verifies cross-user access is denied"
    evidence:
      - "apps/backend/src/modules/tasks/tasks.repository.ts - .where(eq(tasks.userId, userId))"
      - "apps/backend/src/modules/projects/projects.repository.ts - same pattern"

  API2_broken_authentication:
    status: pass
    severity: critical
    notes: "Logto OIDC handles all authentication. Backend validates JWT signatures. No custom session management."
    controls:
      - "Logto issues and validates JWTs (RS256)"
      - "Token validation on every authenticated request"
      - "Refresh token rotation prevents replay"
      - "Rate limiting on auth endpoints (10 req / 15 min)"
    evidence:
      - "apps/backend/src/middleware/auth.ts"
      - "infra/security/rate-limits.yaml"

  API3_broken_object_property_level_auth:
    status: pass
    severity: high
    notes: "Zod schemas define allowed fields per endpoint. No mass assignment possible. Response serialization strips internal fields."
    controls:
      - "Zod input schemas whitelist allowed fields (createTaskSchema, updateTaskSchema)"
      - "No spread of request body directly to DB queries"
      - "Response DTOs exclude internal fields (logtoId, internal timestamps)"
    evidence:
      - "apps/backend/src/modules/tasks/tasks.schema.ts"
      - "apps/backend/src/modules/projects/projects.schema.ts"

  API4_unrestricted_resource_consumption:
    status: pass
    severity: high
    notes: "Rate limiting on all endpoints. Cursor-based pagination prevents large result sets. Request body size limits."
    controls:
      - "Global rate limit: 100 req/min per IP"
      - "Auth endpoints: 10 req/15min"
      - "Cursor-based pagination with max limit=100"
      - "Request body size limit (1MB default, 10MB for imports)"
      - "BullMQ queue backpressure for notification sending"
    evidence:
      - "apps/backend/src/middleware/rate-limit.ts"
      - "infra/security/rate-limits.yaml"

  API5_broken_function_level_auth:
    status: pass
    severity: critical
    notes: "Admin endpoints require admin role. Regular users cannot access management functions. Webhooks use shared secrets."
    controls:
      - "Role check middleware for admin routes (Phase 4)"
      - "Webhook endpoints verify provider signatures"
      - "No function-level bypass via parameter manipulation"
    evidence:
      - "apps/backend/src/modules/channels/webhook-handler.ts"

  API6_unrestricted_access_to_sensitive_flows:
    status: pass
    severity: high
    notes: "OTP verification rate-limited (3/hour). Password reset requires email verification. No automated abuse vectors."
    controls:
      - "OTP send limited to 3 attempts per hour"
      - "OTP verification uses timing-safe comparison"
      - "Password reset via Logto with email verification"
      - "Account creation requires OIDC flow (no direct registration)"
    evidence:
      - "apps/backend/src/modules/channels/verification.ts"

  API7_server_side_request_forgery:
    status: pass
    severity: high
    notes: "No user-controlled URL fetching. All external API calls use hardcoded provider URLs. Webhook URLs validated."
    controls:
      - "External API base URLs from environment variables only"
      - "No user-supplied URLs in server-side requests"
      - "Webhook callback URLs restricted to known providers"
      - "Content delivery uses pre-configured CDN URLs"

  API8_security_misconfiguration:
    status: pass
    severity: medium
    notes: "Security headers configured (CSP, HSTS, X-Frame-Options). CORS restricted. Error messages sanitized."
    controls:
      - "Content-Security-Policy headers (infra/security/csp-headers.ts)"
      - "CORS restricted to known origins"
      - "Error handler returns generic messages (no stack traces in production)"
      - "Server version headers removed"
      - "HTTPS-only in production (HSTS preload)"
    evidence:
      - "apps/backend/src/middleware/security-headers.ts - OWASP headers applied globally"
      - "infra/security/csp-headers.ts"
      - "apps/backend/src/middleware/error-handler.ts"
      - "apps/landing/vercel.json - landing page security headers"

  API9_improper_inventory_management:
    status: pass
    severity: medium
    notes: "Single API version (/api/v1/). No shadow or deprecated endpoints. API documentation auto-generated."
    controls:
      - "All routes registered via centralized module registry"
      - "No legacy or undocumented endpoints"
      - "API versioning via URL prefix (/api/v1/)"
      - "Health endpoint publicly accessible for monitoring"
    evidence:
      - "apps/backend/src/modules/index.ts"

  API10_unsafe_consumption_of_apis:
    status: pass
    severity: medium
    notes: "All external API responses validated before use. Timeouts configured. Circuit breaker pattern for channel adapters."
    controls:
      - "Zod validation on external API responses (Logto, Gupshup, MSG91)"
      - "HTTP timeouts on all external calls (30s default)"
      - "Retry with exponential backoff for transient failures"
      - "Channel adapter errors do not cascade to user requests"
    evidence:
      - "apps/backend/src/services/channel-adapters/"

# ─────────────────────────────────────────────────────────────────────────────
# India DPDP Act 2023 Compliance
# ─────────────────────────────────────────────────────────────────────────────

india_dpdp_compliance:
  data_minimization:
    status: pass
    notes: "Only essential PII collected (email, display name). No Aadhaar, PAN, or biometric data."

  purpose_limitation:
    status: pass
    notes: "Data used strictly for reminder delivery. No third-party sharing without consent."

  consent_management:
    status: partial
    notes: "Basic consent during onboarding. Granular consent UI planned for Phase 5."
    todo:
      - "Implement granular consent management screen"
      - "Add consent withdrawal mechanism"
      - "Consent audit trail"

  data_erasure:
    status: pass
    notes: "Account deletion with 30-day grace period. GDPR data export endpoint. Import/export module supports full data portability."
    controls:
      - "DELETE /api/v1/import-export/account - 30-day grace period deletion"
      - "POST /api/v1/import-export/data-export - GDPR-compliant full data export"
      - "Export to CSV/JSON/ICS formats"
    evidence:
      - "packages/feature_import_export/lib/src/presentation/providers/import_export_providers.dart"
      - "apps/backend/src/modules/import-export/"

  breach_notification:
    status: partial
    notes: "Sentry + PostHog for anomaly detection. Formal breach response procedure needed."
    todo:
      - "Document formal breach notification procedure (72-hour window)"
      - "Set up automated alerting for suspicious patterns"

  data_protection_officer:
    status: not_applicable
    notes: "DPO appointment required only for Significant Data Fiduciaries. Review when crossing 1M users."
