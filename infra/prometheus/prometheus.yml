# Prometheus Configuration for Local Development
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the backend API (Hono server)
  # The backend should expose /metrics endpoint using prom-client
  - job_name: 'todo-api'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Scrape PostgreSQL (via postgres_exporter if added later)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Scrape Redis (via redis_exporter if added later)
